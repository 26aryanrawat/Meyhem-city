<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYHEM CITY</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  background: 
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
    url('poster-main.jpg');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* GLITCH TEXT */
.glitch {
  font-size: 4rem;
  color: red;
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { text-shadow: 2px 2px red; }
  25% { text-shadow: -2px -2px white; }
  50% { text-shadow: 2px -2px red; }
  75% { text-shadow: -2px 2px white; }
  100% { text-shadow: 2px 2px red; }
}

.tagline {
  margin-top: 10px;
  letter-spacing: 3px;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: red;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: darkred;
  transform: scale(1.1);
}

/* SECTION */
section {
  padding: 60px 20px;
  text-align: center;
}

/* GAME GRID */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
  padding: 40px;
}

.game-card {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}

.game-card img {
  width: 100%;
  height: 400px;
  object-fit: cover;
  transition: 0.4s;
}

.game-card span {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.7);
  text-align: center;
  font-weight: bold;
}

.game-card:hover img {
  transform: scale(1.1);
}

/* FORM */
input, textarea {
  width: 80%;
  padding: 10px;
  margin: 10px 0;
  background: black;
  border: 1px solid red;
  color: white;
}

footer {
  padding: 20px;
  background: #111;
}
</style>

</head>

<body>

<!-- HERO -->

<div class="hero">
  <h1 class="glitch">MAYHEM CITY</h1>
  <p class="tagline">NO RULES. NO MERCY. NO ESCAPE.</p>
  <p>28th March</p>
  <button class="btn" onclick="scrollToForm()">ENTER IF YOU DARE</button>
</div>

<!-- ABOUT -->

<section>
  <h2>THE SHOW</h2>
  <p>The most brutal indoor survival game. Only the strongest survive.</p>
</section>

<!-- ROUNDS -->

<section>
  <h2>ROUNDS</h2>

  <div class="game-grid">

```
<div class="game-card">
  <img src="round1.jpg">
  <span>ROYAL RUMBLE</span>
</div>

<div class="game-card">
  <img src="round2.jpg">
  <span>CHAOS TRAP</span>
</div>

<div class="game-card">
  <img src="round3.jpg">
  <span>BLIND CHAOS</span>
</div>

<div class="game-card">
  <img src="round4.jpg">
  <span>BRAIN HUNT</span>
</div>

<div class="game-card">
  <img src="round5.jpg">
  <span>TEAM BREAKER</span>
</div>

<div class="game-card">
  <img src="final.jpg">
  <span>FINAL: LAST ONE STANDING</span>
</div>
```

  </div>
</section>

<!-- FORM -->

<section id="form">
  <h2>JOIN THE CHAOS</h2>

  <input type="text" placeholder="Full Name">
  <input type="number" placeholder="Age">
  <input type="text" placeholder="Phone Number">
  <textarea placeholder="Why should you be selected?"></textarea>
  <textarea placeholder="What dare would you give someone?"></textarea>

<button class="btn">SUBMIT</button>

</section>

<!-- FOOTER -->

<footer>
  <p>© MAYHEM CITY</p>
</footer>

<script>
function scrollToForm() {
  document.getElementById("form").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
