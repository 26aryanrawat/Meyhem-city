<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYHEM CITY</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Arial', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
              url('https://images.unsplash.com/photo-1520975922327-8b456906c813');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* GLITCH TEXT */
.glitch {
  font-size: 4rem;
  color: red;
  position: relative;
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { text-shadow: 2px 2px red; }
  25% { text-shadow: -2px -2px white; }
  50% { text-shadow: 2px -2px red; }
  75% { text-shadow: -2px 2px white; }
  100% { text-shadow: 2px 2px red; }
}

.tagline {
  margin-top: 10px;
  letter-spacing: 3px;
  font-size: 1.2rem;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: red;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: darkred;
  transform: scale(1.1);
}

/* SECTION */
section {
  padding: 60px 20px;
  text-align: center;
}

.rounds {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  border: 1px solid red;
  padding: 20px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(255,0,0,0.1);
}

/* FORM */
input, textarea {
  width: 80%;
  padding: 10px;
  margin: 10px 0;
  background: black;
  border: 1px solid red;
  color: white;
}

footer {
  padding: 20px;
  background: #111;
}
</style>
</head>

<body>

<div class="hero">
  <h1 class="glitch">MAYHEM CITY</h1>
  <p class="tagline">NO RULES. NO MERCY. NO ESCAPE.</p>
  <p>28th March</p>
  <button class="btn" onclick="scrollToForm()">ENTER IF YOU DARE</button>
</div>

<section>
  <h2>THE SHOW</h2>
  <p>The most brutal indoor survival game. Only the strongest survive.</p>
</section>

<section>
  <h2>ROUNDS</h2>
  <div class="rounds">

    <div class="card"><h3>Annihilation Arena</h3></div>
    <div class="card"><h3>Controlled Chaos</h3></div>
    <div class="card"><h3>Trust No One</h3></div>
    <div class="card"><h3>Mind Collapse</h3></div>
    <div class="card"><h3>The Killing Path</h3></div>
    <div class="card"><h3>The Last Stand</h3></div>

  </div>
</section>

<section id="form">
  <h2>JOIN THE CHAOS</h2>

  <input type="text" placeholder="Full Name">
  <input type="number" placeholder="Age">
  <input type="text" placeholder="Phone Number">
  <textarea placeholder="Why should you be selected?"></textarea>
  <textarea placeholder="What dare would you give someone?"></textarea>

  <button class="btn">SUBMIT</button>
</section>

<footer>
  <p>© MAYHEM CITY</p>
</footer>

<script>
function scrollToForm() {
  document.getElementById("form").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
